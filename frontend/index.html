<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="index.css">

</head>

<body>

    <div class="container">

        <!-- LOGIN FORM -->

        <div class="login_box" id="login_form">

            <h2>Login</h2>

            <form id="login-form" action="#" method="POST">

                <div class="input-group">
                    <label for="login-username">Username</label>
                    <input id="login-username" name="username" type="text" placeholder="Enter your username" required>
                </div>

                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input id="login-password" name="password" type="password" placeholder="Enter your password"
                        required>
                </div>

                <button type="submit" class="btn">
                    Login
                </button>

                <p class="switch-text">
                    Don't have an account?
                    <a onclick="showRegister()">Register now</a>
                </p>

            </form>

        </div>


        <!-- REGISTER FORM -->

        <div class="register_box hidden" id="register_form">

            <h2>Register</h2>

            <form id="register-form" action="#" method="POST">

                <div class="input-group">
                    <label for="register-username">Username</label>
                    <input id="register-username" type="text" name="username" placeholder="Enter username" required>
                </div>

                <div class="input-group">
                    <label for="register-pass">Password</label>
                    <input id="register-pass" type="password" name="password" placeholder="Enter password" required>
                </div>

                <div class="input-group">
                    <label for="register-confirm">Confirm Password</label>
                    <input type="password" id="register-confirm" name="confirm" placeholder="Confirm password" required>
                </div>

                <div class="input-group">
                    <label for="register-email">Email</label>
                    <input id="register-email" type="email" name="email" placeholder="example@mail.com" required>
                </div>

                <div class="input-group">
                    <label for="register-name">Name</label>
                    <input id="register-name" type="text" name="name" placeholder="Your name" required>
                </div>

                <div class="input-group">
                    <label for="register-phone">Phone</label>
                    <input id="register-phone" type="text" name="phone" placeholder="+20" required>
                </div>

                <div class="input-group">
                    <label for="register-job">Job Name</label>
                    <input id="register-job" type="text" name="job_name" placeholder="Your job" required>
                </div>

                <button type="submit" class="btn">
                    Register
                </button>

                <p class="switch-text">
                    Already have an account?
                    <a onclick="showLogin()">Login now</a>
                </p>

            </form>

        </div>

    </div>


    <script src="index.js"></script>

</body>

</html>
