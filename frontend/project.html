<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="project.css">
</head>
<body>

    <div class="container">

        <div id="nav-bar">
            <div class="nav-left">
                <button class="back-btn" onclick="history.back()">&#8592; Back</button>
                <div class="nav-logo">TASKFLOW</div>
            </div>
            <div class="nav-center">
                <span class="nav-project-name" id="nav-project-name">Loading...</span>
                <span class="nav-project-desc" id="nav-project-desc"></span>
            </div>
            <div class="nav-right" id="nav-user">—</div>
        </div>

        <div id="content">
            <div class="content-header">
                <div>
                    <h1 class="page-title">Tasks</h1>
                    <p class="page-sub" id="task-count">Fetching tasks...</p>
                </div>
                <div class="header-actions">
                    <button class="btn-outline hidden" id="join-requests-btn">
                        📋 Join Requests
                        <span class="badge hidden" id="requests-badge">0</span>
                    </button>
                    <button class="btn-outline hidden" id="invite-btn">+ Invite Member</button>
                    <button class="add-task" id="add-task-btn">+ New Task</button>
                </div>
            </div>

            <div id="tasks-grid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="add-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>New Task</h2>
                <button class="modal-close" id="close-add-modal">✕</button>
            </div>
            <div class="modal-body">
                <label>Task Name</label>
                <input type="text" id="task-name-input" placeholder="e.g. Design landing page" />
                <label>Description</label>
                <textarea id="task-desc-input" placeholder="What needs to be done?"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-add-modal">Cancel</button>
                <button class="btn-primary" id="confirm-add-task">Create Task</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="members-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Task Members</h2>
                <button class="modal-close" id="close-members-modal">✕</button>
            </div>
            <div class="modal-body">
                <ul id="members-list"></ul>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-members-modal">Close</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="delete-modal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2>Delete Task</h2>
                <button class="modal-close" id="close-delete-modal">✕</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this task? This cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-delete-modal">Cancel</button>
                <button class="btn-danger" id="confirm-delete-task">Delete</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="invite-modal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2>Invite Member</h2>
                <button class="modal-close" id="close-invite-modal">✕</button>
            </div>
            <div class="modal-body">
                <label>Username</label>
                <input type="text" id="invite-username-input" placeholder="e.g. john99" />
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-invite-modal">Cancel</button>
                <button class="btn-primary" id="confirm-invite">Send Invite</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="requests-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Join Requests</h2>
                <button class="modal-close" id="close-requests-modal">✕</button>
            </div>
            <div class="modal-body">
                <ul id="requests-list"></ul>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-requests-modal">Close</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="project.js"></script>
</body>
</html>
